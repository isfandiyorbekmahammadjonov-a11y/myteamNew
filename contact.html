<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./cantact.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img src="./img/myteam 2.svg" alt="myteam" />
        </div>
        <div class="nav-links">
          <a href="./index.html">home</a>
          <a href="./about.html">about</a>
        </div>
        <a href="./contact.html" class="contact-btn">contact us</a>
        <button id="bar"><img src="./img/bars.svg" alt="bars" /></button>
        <section class="bars hidden">
          <img src="./img/xmark.svg" alt="xmark" id="xmark" />
          <a href="./index.html" class="a">home</a>
          <a href="./about.html">about</a>
          <a href="./contact.html">contact us</a>
        </section>
      </nav>
      <section class="contact">
        <div class="container contact-wrapper">
          <div class="contact-info">
            <h1>Contact</h1>
            <h2 class="ask-us">Ask us about</h2>

            <div class="info-list">
              <div class="info-item">
                <img src="./img/icon-feature-experience.svg" alt="person" />
                <p>The quality of our talent network</p>
              </div>
              <div class="info-item">
                <img src="./img/cog.svg" alt="cog" />
                <p>Usage & implementation of our software</p>
              </div>
              <div class="info-item">
                <img src="./img/icon-feature-productivity.svg" alt="chart" />
                <p>How we help drive innovation</p>
              </div>
            </div>
          </div>

          <form class="contact-form">
            <div class="input-group">
              <input type="text" placeholder="Name" required />
            </div>
            <div class="input-group">
              <input type="email" placeholder="Email Address" required />
            </div>
            <div class="input-group">
              <input type="text" placeholder="Company Name" required />
            </div>
            <div class="input-group">
              <input type="text" placeholder="Title" required />
            </div>
            <div class="input-group">
              <textarea placeholder="Message" rows="3" required></textarea>
            </div>
            <button type="submit" class="submit-btn">submit</button>
          </form>
        </div>
      </section>
    </header>
    <footer>
      <div class="container footer-wrapper">
        <div class="footer-nav">
          <img src="./img/myteam 2.svg" alt="myteam" />
          <div class="footer-links">
            <a href="#">home</a>
            <a href="#">about</a>
          </div>
        </div>
        <div class="footer-address">
          <p>987 Hillcrest Lane</p>
          <p>Irvine, CA</p>
          <p>California 92714</p>
          <p>Call Us : 949-833-7432</p>
        </div>
        <div class="footer-social">
          <img src="./img/social.svg" alt="social" />
          <p class="copyright">Copyright 2020. All Rights Reserved</p>
        </div>
      </div>
    </footer>
  </body>
  <script src="./app.js"></script>
</html>
